<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>UltraQueue – Song catalogue</title>
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<h1>Song catalogue</h1>

<form th:action="@{/}" method="get">
  <input type="text" name="query" th:value="${query}" placeholder="Search…"/>
  <input type="hidden" name="replaceEntryId" th:value="${replaceEntryId}" th:if="${replaceEntryId != null}"/>
  <button type="submit">Search</button>
</form>

<table>
  <thead>
  <tr>
    <th><a th:href="@{/(page=0, sort='title', dir=${dir == 'ASC' ? 'DESC' : 'ASC'}, query=${query}, replaceEntryId=${replaceEntryId})}">Title</a></th>
    <th><a th:href="@{/(page=0, sort='artist', dir=${dir == 'ASC' ? 'DESC' : 'ASC'}, query=${query}, replaceEntryId=${replaceEntryId})}">Artist</a></th>
    <th>Language</th>
    <th>Genre</th>
    <th><a th:href="@{/(page=0, sort='year', dir=${dir == 'ASC' ? 'DESC' : 'ASC'}, query=${query}, replaceEntryId=${replaceEntryId})}">Year</a></th>
    <th>Est. Length</th>
    <th>Action</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="song : ${songs}">
    <td th:text="${song.title}"></td>
    <td th:text="${song.artist}"></td>
    <td th:text="${song.language}"></td>
    <td th:text="${song.genre}"></td>
    <td th:text="${song.year}"></td>
    <td th:text="${#numbers.formatInteger(song.lengthSeconds / 60, 1) + ':' + #numbers.formatInteger(song.lengthSeconds % 60, 2)}"></td>
    <td>
      <form th:if="${replaceEntryId == null}" th:action="@{/queue/add}" method="post">
        <input type="hidden" name="songId" th:value="${song.id}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Add to queue</button>
      </form>
      <form th:if="${replaceEntryId != null}" th:action="@{/queue/replace/{id}(id=${replaceEntryId})}" method="post">
        <input type="hidden" name="newSongId" th:value="${song.id}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Replace</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<div>
  <span th:text="'Page ' + ${page.number + 1} + ' of ' + ${page.totalPages}"></span>
  <a th:if="${page.hasPrevious()}"
     th:href="@{/(page=${page.number - 1},size=${page.size},sort=${sort},dir=${dir},query=${query},replaceEntryId=${replaceEntryId})}">Prev</a>
  <a th:if="${page.hasNext()}"
     th:href="@{/(page=${page.number + 1},size=${page.size},sort=${sort},dir=${dir},query=${query},replaceEntryId=${replaceEntryId})}">Next</a>
</div>

</body>
</html>
