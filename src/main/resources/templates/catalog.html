<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UltraQueue – Song catalogue</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/main.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="container mt-4">

<div class="mb-3">
  <a th:href="@{/queue}" class="btn btn-outline-primary">Currently queued songs</a>
</div>

<h1 class="mb-4">Song catalogue</h1>

<div th:if="${usernameSet}" class="alert alert-info d-flex align-items-center gap-2">
  <span>Queueing as</span>
  <span class="d-inline-block rounded-circle"
        th:style="'width: 0.9rem; height: 0.9rem; background-color: ' + ${currentUserColor}"></span>
  <strong th:text="${currentUsername}"></strong>
</div>
<div th:unless="${usernameSet}" class="alert alert-warning">
  Choose a username the first time you queue a song.
</div>

<form th:action="@{/}" method="get" class="row g-2 mb-4">
  <div class="col-auto">
    <input type="text" name="query" th:value="${query}" class="form-control" placeholder="Search…"/>
  </div>
  <input type="hidden" name="replaceEntryId" th:value="${replaceEntryId}" th:if="${replaceEntryId != null}"/>
  <div class="col-auto">
    <button type="submit" class="btn btn-primary">Search</button>
  </div>
</form>

<table class="table table-striped table-hover mt-3">
  <thead class="table-dark">
  <tr>
    <th>Action</th>
    <th><a class="text-white text-decoration-none" th:href="@{/(page=0, sort='title', dir=${dir == 'ASC' ? 'DESC' : 'ASC'}, query=${query}, replaceEntryId=${replaceEntryId})}">Title</a></th>
    <th><a class="text-white text-decoration-none" th:href="@{/(page=0, sort='artist', dir=${dir == 'ASC' ? 'DESC' : 'ASC'}, query=${query}, replaceEntryId=${replaceEntryId})}">Artist</a></th>
    <th>Language</th>
    <th>Genre</th>
    <th><a class="text-white text-decoration-none" th:href="@{/(page=0, sort='year', dir=${dir == 'ASC' ? 'DESC' : 'ASC'}, query=${query}, replaceEntryId=${replaceEntryId})}">Year</a></th>
    <th>Est. Length</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="song : ${songs}">
    <td>
      <form th:if="${replaceEntryId == null}" th:action="@{/queue/add}" method="post">
        <input type="hidden" name="songId" th:value="${song.id}"/>
        <input type="hidden" name="username" th:if="${usernameSet}" th:value="${currentUsername}"/>
        <input type="text" name="username" th:unless="${usernameSet}" class="form-control form-control-sm mb-2" placeholder="Choose username" required/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-sm btn-success">Queue</button>
      </form>
      <form th:if="${replaceEntryId != null}" th:action="@{/queue/replace/{id}(id=${replaceEntryId})}" method="post">
        <input type="hidden" name="newSongId" th:value="${song.id}"/>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-sm btn-warning">Replace</button>
      </form>
    </td>
    <td th:text="${song.title}"></td>
    <td th:text="${song.artist}"></td>
    <td th:text="${song.language}"></td>
    <td th:text="${song.genre}"></td>
    <td th:text="${song.year}"></td>
    <td th:text="${#numbers.formatInteger(song.lengthSeconds / 60, 1) + ':' + #numbers.formatInteger(song.lengthSeconds % 60, 2)}"></td>
  </tr>
  </tbody>
</table>

<div class="d-flex justify-content-between align-items-center mb-5">
  <span th:text="'Page ' + ${page.number + 1} + ' of ' + ${page.totalPages}"></span>
  <nav>
    <ul class="pagination mb-0">
      <li class="page-item" th:classappend="${!page.hasPrevious()} ? 'disabled'">
        <a class="page-link" th:href="@{/(page=${page.number - 1},size=${page.size},sort=${sort},dir=${dir},query=${query},replaceEntryId=${replaceEntryId})}">Prev</a>
      </li>
      <li class="page-item" th:classappend="${!page.hasNext()} ? 'disabled'">
        <a class="page-link" th:href="@{/(page=${page.number + 1},size=${page.size},sort=${sort},dir=${dir},query=${query},replaceEntryId=${replaceEntryId})}">Next</a>
      </li>
    </ul>
  </nav>
</div>

</body>
</html>
