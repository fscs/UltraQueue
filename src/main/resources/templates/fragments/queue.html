<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="queueFragment">
<table class="table table-striped table-hover mt-3">
    <thead class="table-dark">
    <tr>
        <th>#</th>
        <th>Title</th>
        <th>Artist</th>
        <th>User</th>
        <th>Est. in</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="e : ${queue}" th:classappend="${e.ownedByMe} ? ' own-queue-item' : ''">
        <td th:text="${e.position}"></td>
        <td><a th:href="@{/song/{id}(id=${e.entryId})}" th:text="${e.title}"></a></td>
        <td th:text="${e.artist}"></td>
        <td>
      <span class="user-color-label" th:text="${e.username}"
            th:style="'--user-color: ' + ${e.userColor}"></span>
        </td>
        <td th:text="${e.waitTime}"></td>
        <td>
            <div th:if="${e.ownedByMe}" class="d-inline-flex gap-1">
                <form th:action="@{/queue/remove/{id}(id=${e.entryId})}"
                      method="post" class="d-inline" onsubmit="return confirm('By deleting this song request, you also loose your position in the queue!')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                </form>
                <a th:if="${e.position > 1}" th:href="@{/(replaceEntryId=${e.entryId})}" class="btn btn-sm btn-warning">
                    Replace
                </a>
            </div>

            <!-- Admin can delete any entry -->
            <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="d-inline-flex gap-1 ms-2">
                <form th:action="@{/queue/remove/{id}(id=${e.entryId})}" method="post"
                      class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-sm btn-danger admin">Admin‑Delete</button>
                </form>
                <a th:href="@{/(replaceEntryId=${e.entryId})}" class="btn btn-sm btn-warning admin">
                    Admin-Replace
                </a>
            </div>
        </td>
    </tr>
    </tbody>
</table>
</div>
</body>
</html>
