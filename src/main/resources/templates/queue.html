<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UltraQueue – Current queue</title>
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
  <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body class="container mt-4">

<div class="mb-3">
  <a th:href="@{/}" class="btn btn-outline-primary">← Back to catalogue</a>
</div>

<h1 class="mb-4">Current Queue</h1>

<div th:if="${usernameSet}" class="alert alert-info d-flex align-items-center gap-2">
  <span>Your username:</span>
  <strong class="user-color-label" th:text="${currentUsername}"
          th:style="'--user-color: ' + ${currentUserColor}"></strong>
</div>
<div th:unless="${usernameSet}" class="alert alert-warning">
  You can choose a username the next time you queue a song.
</div>

<div th:if="${flash}" th:text="${flash}" class="alert alert-success"></div>
<div th:if="${error}" th:text="${error}" class="alert alert-danger"></div>

<table class="table table-striped table-hover mt-3">
  <thead class="table-dark">
  <tr>
    <th>#</th>
    <th>Title</th>
    <th>Artist</th>
    <th>User</th>
    <th>Est. start</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="e : ${queue}" th:classappend="${e.ownedByMe} ? ' own-queue-item' : ''">
    <td th:text="${e.position}"></td>
    <td><a th:href="@{/song/{id}(id=${e.entryId})}" th:text="${e.title}"></a></td>
    <td th:text="${e.artist}"></td>
    <td>
      <span class="user-color-label" th:text="${e.username}"
            th:style="'--user-color: ' + ${e.userColor}"></span>
    </td>
    <td th:text="${e.estimatedStart}"></td>
    <td>
      <div th:if="${e.ownedByMe}" class="d-inline-flex gap-1">
        <form th:action="@{/queue/remove/{id}(id=${e.entryId})}"
              method="post" class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-sm btn-danger">Remove</button>
        </form>
        <a th:if="${e.position > 1}" th:href="@{/(replaceEntryId=${e.entryId})}" class="btn btn-sm btn-warning">
          Replace
        </a>
      </div>

      <!-- Admin can delete any entry -->
      <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}" class="d-inline-flex gap-1 ms-2">
        <form th:action="@{/queue/remove/{id}(id=${e.entryId})}" method="post"
              class="d-inline">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-sm btn-danger admin">Admin‑Delete</button>
        </form>
        <a th:href="@{/(replaceEntryId=${e.entryId})}" class="btn btn-sm btn-warning admin">
          Admin-Replace
        </a>
      </div>
    </td>
  </tr>
  </tbody>
</table>

</body>
</html>
