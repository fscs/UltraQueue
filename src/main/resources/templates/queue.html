<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>UltraQueue – Current queue</title></head>
<body>
<h1>Current Queue</h1>

<div th:if="${flash}" th:text="${flash}" style="color:green;"></div>
<div th:if="${error}" th:text="${error}" style="color:red;"></div>

<table>
  <thead>
  <tr>
    <th>#</th>
    <th>Title</th>
    <th>Artist</th>
    <th>Est. start</th>
    <th>Actions</th>
  </tr>
  </thead>
  <tbody>
  <tr th:each="e : ${queue}">
    <td th:text="${e.position}"></td>
    <td th:text="${e.title}"></td>
    <td th:text="${e.artist}"></td>
    <td th:text="${e.estimatedStart}"></td>
    <td>
      <form th:if="${e.ownedByMe}" th:action="@{/queue/remove/{id}(id=${e.entryId})}"
            method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit">Remove</button>
      </form>

      <!-- Admin can delete any entry -->
      <form th:if="${#authorization.expression('hasRole(''ADMIN'')')}"
            th:action="@{/queue/remove/{id}(id=${e.entryId})}" method="post"
            style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" style="color:red;">Admin‑Delete</button>
      </form>
    </td>
  </tr>
  </tbody>
</table>

<a th:href="@{/}">← Back to catalogue</a>
</body>
</html>
