<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UltraQueue – Current queue</title>

  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="../static/css/bootstrap.min.css">
  <link rel="stylesheet" th:href="@{/css/main.css}" href="../static/css/main.css">

  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.3/sse.js"></script>
</head>
<body class="container mt-4">

<div class="mb-3">
  <a th:href="@{/}" class="btn btn-outline-primary">← Back to catalogue</a>
</div>

<h1 class="mb-4">Current Queue</h1>

<div th:if="${usernameSet}" class="alert alert-info d-flex align-items-center gap-2">
  <span>Your username:</span>
  <strong class="user-color-label"
          th:text="${currentUsername}"
          th:style="'--user-color: ' + ${currentUserColor}"></strong>
</div>

<div th:if="${flash}" th:text="${flash}" class="alert alert-success"></div>
<div th:if="${error}" th:text="${error}" class="alert alert-danger"></div>

<div
        hx-ext="sse"
        sse-connect="/queue/events">

  <div id="queue-container"
       hx-get="/queue/fragment"
       hx-trigger="sse:queue-update">

    <div th:replace="~{fragments/queue :: queueFragment}"></div>

  </div>

</div>

</body>
</html>
