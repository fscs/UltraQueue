<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UltraQueue – Current queue</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" href="../static/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}" href="../static/css/main.css">
</head>
<body class="container-fluid mt-4" >
<div th:if="${queue.isEmpty()}">
    <div class="h2 text-center">
        Die Warteschlange ist leer.
    </div>
</div>
<div th:if="${!queue.isEmpty()}" class="row">
    <div class="col">
        <div class="d-flex flex-column justify-content-center align-items-center" th:object="${queue.getFirst()}">
            <img class="mt-5" src="../static/images/senredipity.jpg" th:src="*{coverPath}" width="80%">
            <h2 class="mt-5 text-center" th:text="*{title}">Knuts Song</h2>
            <span class="h4 text-center" th:text="*{artist}">Justin Bieber</span>
            <span class="h4 text-center" th:text="*{username}">Sören</span>
        </div>
    </div>
    <div class="col">
        <table class="table table-striped table-hover mt-3 fs-3">
            <thead class="table-dark">
            <tr th:if="${queue.size() >= 2}">
                <th>Title</th>
                <th>User</th>
                <th>in</th>
            </tr>
            <tr th:if="${queue.size() < 2}">
                <th> Hier könnte ihr Song stehen </th>
            </tr>
            </thead>
            <tbody th:remove="all-but-first">
            <tr th:each="e : ${queue.size() >= 2 ? queue.subList(1, queue.size()) : null}">
                <td th:text="${e.title}">Vim ist so toll</td>
                <td th:text="${e.username()}">Robert</td>
                <td class="text-nowrap"><span th:text="${e.waitTime}">5</span> min</td>
            </tr>
            <tr>
                <td>I use nix btw.</td>
                <td>Arthur Wienstroer</td>
                <td class="text-nowrap">11 min</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
